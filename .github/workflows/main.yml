name: Windows-RDP

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Download and Extract Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/b342391/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip
    - name: Authenticate Ngrok
      run: |
        .\ngrok\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
    - name: Enable RDP and Set Password
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user administrator "RdpPassword2026!" /add
        net localgroup administrators administrator /add
    - name: Create Tunnel and Keep Alive
      run: |
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389"
        echo "RDP is ready!"
        Start-Sleep -Seconds 21600
