name: Windows-RDP-Pinggy

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Enable RDP and Set Password
      run: |
        # تفعيل الـ RDP في الريجستري وجدار الحماية
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # تعيين باسور الحساب الحالي لـ GitHub Runner
        $Password = ConvertTo-SecureString "Pass2026!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Start RDP Tunnel via Pinggy
      run: |
        # فتح نفق اتصال مباشر لـ RDP بدون حسابات أو برامج خارجية
        ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:3389 rdp@tcp.pinggy.io
