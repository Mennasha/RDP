name: Windows-RDP

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Install Ngrok via Chocolatey
      run: |
        choco install ngrok -y
    - name: Authenticate Ngrok
      run: |
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
    - name: Enable RDP and Set Password
      run: |
        # تفعيل الـ RDP في الريجستري وجدار الحماية
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # تغيير باسور الحساب الحالي لـ GitHub Runner نفسه لضمان الدخول المباشر
        $Password = ConvertTo-SecureString "Pass2026!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
    - name: Create Tunnel and Keep Alive
      run: |
        Start-Process ngrok -ArgumentList "tcp --region us 3389"
        echo "RDP is ready!"
        Start-Sleep -Seconds 21600
