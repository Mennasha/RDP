name: Windows-RDP

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Install Ngrok via Chocolatey
      run: |
        choco install ngrok -y
    - name: Authenticate Ngrok
      run: |
        # وضع التوكين مباشرة لضمان الربط بالحساب الصحيح
        ngrok config add-authtoken 3DmWRfeoHOY0fAY9xKxNr44N9t7_ddiGYEkFqsLXd8MAEYxm
    - name: Enable RDP and Set Password
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        $Password = ConvertTo-SecureString "Pass2026!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
    - name: Create Tunnel and Keep Alive
      run: |
        # تشغيل النفق على السيرفر الأوروبي المستقر
        Start-Process ngrok -ArgumentList "tcp --region eu 3389"
        echo "RDP is ready!"
        Start-Sleep -Seconds 21600
